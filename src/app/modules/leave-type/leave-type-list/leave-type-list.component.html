  <!-- Search and Actions -->
  <div class="search-action-section">
    <div class="search-bar">
      <i class="bi bi-search search-icon"></i>
      <input type="text" placeholder="Search by name or code..."
        [(ngModel)]="searchTerm" (keyup)="onSearch()" class="search-input" />
    </div>
    <button class="btn btn-filter" (click)="showFilters = !showFilters">
      <i class="bi bi-funnel"></i> Filters
      <span class="filter-badge" *ngIf="activeFilterCount > 0">{{ activeFilterCount }}</span>
    </button>
    <button class="btn btn-clear"   (click)="clearFilters()">    <i class="bi bi-x-circle"></i> Clear    </button>
    <button class="btn btn-refresh" (click)="loadLeaveTypes()">  <i class="bi bi-arrow-clockwise"></i> Refresh </button>
    <button class="btn btn-export"  (click)="exportToExcel()">   <i class="bi bi-download"></i> Export   </button>
    <button class="btn btn-primary" (click)="createLeaveType()"> <i class="bi bi-plus-circle"></i> Add Leave Type </button>
  </div>

  <!-- Filter Panel -->
  <div class="filters-panel" [class.open]="showFilters">
    <div class="filters-grid">
      <div class="filter-group">
        <label>Status</label>
        <select [(ngModel)]="filters.isActive" (change)="onFilterChange()">
          <option [ngValue]="null">All Statuses</option>
          <option [ngValue]="true">Active Only</option>
          <option [ngValue]="false">Inactive Only</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Requires Approval</label>
        <select [(ngModel)]="filters.requiresApproval" (change)="onFilterChange()">
          <option [ngValue]="null">All</option>
          <option [ngValue]="true">Yes</option>
          <option [ngValue]="false">No</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Requires Document</label>
        <select [(ngModel)]="filters.requiresDocument" (change)="onFilterChange()">
          <option [ngValue]="null">All</option>
          <option [ngValue]="true">Yes</option>
          <option [ngValue]="false">No</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Carry Forward</label>
        <select [(ngModel)]="filters.isCarryForward" (change)="onFilterChange()">
          <option [ngValue]="null">All</option>
          <option [ngValue]="true">Yes</option>
          <option [ngValue]="false">No</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="loading-state">
    <div class="spinner"></div>
    <p>Loading leave types...</p>
  </div>

  <!-- Error -->
  <div *ngIf="error && !loading" class="error-state">
    <i class="bi bi-exclamation-circle"></i>
    <p>{{ error }}</p>
    <button class="btn btn-outline" (click)="loadLeaveTypes()">Try Again</button>
  </div>

  <!-- Grid -->
  <div *ngIf="!loading && !error" class="grid-container">
    <div *ngIf="leaveTypes.length === 0" class="empty-state">
      <i class="bi bi-calendar2-x"></i>
      <h3>No leave types found</h3>
      <p>Try adjusting your filters or create a new leave type</p>
      <button class="btn btn-primary" (click)="createLeaveType()">Add Leave Type</button>
    </div>

    <ag-grid-angular
      *ngIf="leaveTypes.length > 0"
      class="ag-theme-quartz"
      [rowData]="leaveTypes"
      [columnDefs]="columnDefs"
      [defaultColDef]="defaultColDef"
      [gridOptions]="gridOptions"
      (gridReady)="onGridReady($event)"
      [rowHeight]="64"
      [headerHeight]="50"
      [domLayout]="'autoHeight'">
    </ag-grid-angular>

    <!-- Pagination Bar -->
    <div *ngIf="leaveTypes.length > 0" class="pagination-bar">

      <div class="pagination-info">
        <span class="items-label">
          Showing <strong>{{ showingFrom }}</strong>–<strong>{{ showingTo }}</strong>
          of <strong>{{ totalCount }}</strong> leave types
        </span>
        <label class="page-size-label">
          Rows per page:
          <select class="page-size-select" [ngModel]="pageSize" (ngModelChange)="onPageSizeChange($event)">
            <option *ngFor="let opt of pageSizeOptions" [value]="opt">{{ opt }}</option>
          </select>
        </label>
      </div>

      <div class="pagination-nav">
        <button class="page-btn" (click)="onPageChange(1)"               [disabled]="!hasPrevPage" title="First">    <i class="bi bi-chevron-double-left"></i>  </button>
        <button class="page-btn" (click)="onPageChange(currentPage - 1)" [disabled]="!hasPrevPage" title="Previous"> <i class="bi bi-chevron-left"></i>         </button>

        <button
          *ngFor="let p of pages"
          class="page-btn page-number"
          [class.active]="p === currentPage"
          (click)="onPageChange(p)">
          {{ p }}
        </button>

        <button class="page-btn" (click)="onPageChange(currentPage + 1)" [disabled]="!hasNextPage" title="Next"> <i class="bi bi-chevron-right"></i>        </button>
        <button class="page-btn" (click)="onPageChange(totalPages)"      [disabled]="!hasNextPage" title="Last"> <i class="bi bi-chevron-double-right"></i> </button>
      </div>

    </div>
    <!-- End Pagination Bar -->

  </div>
</div>

<!-- Form Modal -->
<div class="modal-overlay" *ngIf="showFormModal" (click)="closeFormModal()">
  <div class="modal-container" (click)="$event.stopPropagation()">
    <button class="modal-close" (click)="closeFormModal()"><i class="bi bi-x-lg"></i></button>
    <app-leave-type-form
      [isModal]="true"
      [leaveTypeId]="selectedLeaveTypeId"
      [isEditMode]="formMode === 'edit'"
      (formCancelled)="closeFormModal()"
      (formSubmitted)="onFormSuccess()">
    </app-leave-type-form>
  </div>
</div>
