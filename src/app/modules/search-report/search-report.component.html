

<div class="logsheet-list-container">
  <!-- Header -->
  <div class="report-header">
    <div class="header-content">
      <div class="header-title">
        <i class="fas fa-clipboard-list"></i>
        <h1>Search Report</h1>
      </div>
      <div class="header-actions">
        <button class="btn-filters" (click)="toggleFilters()" [class.active]="isFiltersOpen"
          aria-label="Toggle Filters">
          <i class="fas fa-filter"></i>
          <span>Filters</span>
        </button>
        <button class="btn-back" (click)="back()">
          <i class="fas fa-arrow-left"></i> Back to Dashboard
        </button>
      </div>
    </div>
  </div>

  <!-- Table View -->
  <div class="table-view">
    <div class="results-container">
      <div class="results-header">
         <div class="filter-controls">
          <div class=" quick-filter">
          <label for="filter-text-box" class="visually-hidden">Quick Filter</label>
          <div class="input-group">
            <span class="input-group-text">
              <i class="fas fa-search"></i>
            </span>
            <input id="filter-text-box" class="form-control" placeholder="S earch logsheets..."
              (input)="onFilterTextBoxChanged()" [(ngModel)]="filterText" />
          </div></div>
        </div>
        <div class="results-actions">
          <button class="btn-export" (click)="exportToExcel()">
            <i class="fas fa-file-excel"></i> Export to Excel
          </button>
        </div>
      </div>

      <!-- Quick Filter and Status Filters -->
       <!-- <div class="filter-controls">
        <div class="quick-filter">
          <label for="filter-text-box" class="visually-hidden">Quick Filter</label>
          <div class="input-group">
            <span class="input-group-text">
              <i class="fas fa-search"></i>
            </span>
            <input id="filter-text-box" class="form-control" placeholder="Search logsheets..."
              (input)="onFilterTextBoxChanged()" [(ngModel)]="filterText" />
          </div>
        </div>

       <div class="status-filters">
          <button class="status-btn" [class.active]="activeFilter === 9" (click)="FilterData(9)">
            <i class="fas fa-list"></i> All
          </button>
          <button class="status-btn open" [class.active]="activeFilter === 0" (click)="FilterData(0)">
            <i class="fas fa-clock"></i> Open
          </button>
          <button class="status-btn closed" [class.active]="activeFilter === 1" (click)="FilterData(1)">
            <i class="fas fa-check-circle"></i> Closed
          </button>
          <button class="status-btn cancelled" [class.active]="activeFilter === 2" (click)="FilterData(2)">
            <i class="fas fa-ban"></i> Cancelled
          </button>
        </div>
      </div> 

      <!-- AG Grid -->
      <div class="grid-container">
        <ag-grid-angular #agGrid style="width: 100%; height: 500px;" class="ag-theme-alpine" [rowData]="reportData"
          [columnDefs]="columnDefs" [defaultColDef]="defaultColDef" [pagination]="true" [paginationPageSize]="100"
          [paginationPageSizeSelector]="[10, 20, 50, 100]" [loading]="isLoading" [suppressColumnVirtualisation]="true"
          [suppressRowVirtualisation]="false" [animateRows]="false" [enableCellTextSelection]="true" [rowBuffer]="10"
          [suppressLoadingOverlay]="false" [suppressNoRowsOverlay]="false" [context]="context"
          (gridReady)="onGridReady($event)">
        </ag-grid-angular>

      </div>
    </div>
  </div>
  <!-- No Data Message -->
  <div class="no-data-message" *ngIf="lstReportData.length === 0">
    <i class="fas fa-exclamation-circle"></i>
    <!-- <p>No logsheet data available for the selected criteria.</p> -->
    <button class="btn-primary" (click)="toggleFilters()">Adjust Filters</button>
  </div>
</div>

<!-- Report Content -->
<div class="report-content report-spacing">
  <!-- Summary Cards -->
  <div class="summary-cards"  *ngIf="lstReportData.length === 0">
    <div class="summary-card">
      <div class="card-icon">
        <i class="fas fa-list-alt"></i>
      </div>
      <div class="card-content">
        <div class="card-value">{{ totalNoOfVehicles }}</div>
        <div class="card-label">Total Vehicles</div>
      </div>
    </div>

    <div class="summary-card">
      <div class="card-icon">
        <i class="fas fa-check-circle"></i>
      </div>
      <div class="card-content">
        <div class="card-value">{{ totalGrossWeightInKG }} KG</div>
        <div class="card-label">Total Gross-Weight</div>
      </div>
    </div>

    <div class="summary-card">
      <div class="card-icon">
        <i class="fas fa-clock"></i>
      </div>
      <div class="card-content">
        <div class="card-value">{{totalUnladenWeightInKg }} KG</div>
        <div class="card-label">Total Tare-Weight</div>
      </div>
    </div>

    <div class="summary-card">
      <div class="card-icon">
        <i class="fas fa-ban"></i>
      </div>
      <div class="card-content">
        <div class="card-value">{{ totalActualNetWeightInKG }} KG</div>
        <div class="card-label">Total Net-Weight</div>
      </div>
    </div>
  </div>  

  <!-- Filters Offcanvas Panel -->
  <!-- Filters Offcanvas Panel -->
  <div class="filters-offcanvas-overlay" [class.show]="isFiltersOpen" (click)="closeFilters()"></div>
  <div class="filters-offcanvas" [class.show]="isFiltersOpen">
    <div class="offcanvas-header">
      <h5 class="offcanvas-title">Search Filters</h5>
      <button class="btn-close" (click)="closeFilters()" aria-label="Close Filters">
        <i class="fas fa-times"></i>
      </button>
    </div>
    <div class="offcanvas-body">
      <div class="filters-content">
        <form [formGroup]="reportForm" (ngSubmit)="onSubmit()">
          <div class="form-group">
            <label for="weighBridge">Weigh Bridge</label>
            <div class="select-wrapper">
              <select id="weighBridge" formControlName="WeighBridge" class="form-control">
                <option value="ALLWB">ALL</option>
                <option *ngFor="let l of lstSiteNames" [value]="l.siteName">
                  {{ l.siteDescription }}
              </select>
              <i class="fas fa-chevron-down"></i>
            </div>
          </div>

          <div class="form-group">
            <label for="fromDate">From Date</label>
            <div class="input-wrapper">
              <input type="date" id="fromDate" formControlName="FromDate" class="form-control">
              <i class="fas fa-calendar-alt"></i>
            </div>
            <div *ngIf="reportForm.get('FromDate')?.invalid && reportForm.get('FromDate')?.touched"
              class="error-message">
              From date is required
            </div>
          </div>

          <div class="form-group">
            <label for="toDate">To Date</label>
            <div class="input-wrapper">
              <input type="date" id="toDate" formControlName="todate" class="form-control">
              <i class="fas fa-calendar-alt"></i>
            </div>
            <div *ngIf="reportForm.get('todate')?.invalid && reportForm.get('todate')?.touched" class="error-message">
              To date is required
            </div>
          </div>

          <!-- <div class="form-group">
            <label for="reportType">Report Type</label>
            <div class="select-wrapper">
              <select id="reportType" formControlName="reportType" class="form-control">
                <option *ngFor="let rt of reportTypeList" [value]="rt.id">{{ rt.value }}</option>
              </select>
              <i class="fas fa-chevron-down"></i>
            </div>
          </div> -->

          <div class="form-actions">
            <button type="submit" class="btn-primary" [disabled]="reportForm.invalid || isLoading">
              <i class="fas fa-search"></i>
              <span *ngIf="!isLoading">Search</span>
              <span *ngIf="isLoading">Searching...</span>
            </button>
            <button type="button" class="btn-secondary" (click)="resetForm()" [disabled]="isLoading">
              <i class="fas fa-undo"></i> Reset
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
