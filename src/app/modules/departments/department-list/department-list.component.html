<div class="department-list-container">
  <!-- Header -->
  <div class="page-header">
    <div class="header-content">
      <h1 class="page-title">Departments</h1>
      <p class="page-subtitle">Manage your organization's departments</p>
    </div>
  </div>

  <!-- Search and Action Buttons -->
  <div class="search-action-section">
    <div class="search-bar">
      <input
        type="text"
        placeholder="Search departments..."
        [(ngModel)]="searchTerm"
        (keyup)="onSearch()"
        class="search-input"
      />
    </div>

    <button class="btn btn-clear" (click)="clearSearch()">Clear</button>

    <button class="btn btn-refresh" (click)="loadDepartments()">Refresh</button>

    <button class="btn btn-primary" (click)="createDepartment()">
      <i class="bi bi-plus-circle"></i>
      Add Department
    </button>
  </div>

  <!-- Advanced Filters -->
  <div class="advanced-filters" *ngIf="showFilters">
    <div class="filter-grid">
      <div class="filter-item">
        <label>Status</label>
        <select
          [(ngModel)]="isActiveFilter"
          (change)="onFilterChange()"
          class="filter-select"
        >
          <option [ngValue]="null">All</option>
          <option [ngValue]="true">Active Only</option>
          <option [ngValue]="false">Inactive Only</option>
        </select>
      </div>

      <div class="filter-item">
        <label>Level</label>
        <div class="checkbox-wrapper">
          <input
            type="checkbox"
            id="rootOnly"
            [(ngModel)]="rootLevelOnly"
            (change)="onFilterChange()"
          />
          <label for="rootOnly">Root Level Only</label>
        </div>
      </div>

      <div class="filter-item">
        <label>Sort By</label>
        <select
          [(ngModel)]="sortBy"
          (change)="onFilterChange()"
          class="filter-select"
        >
          <option value="DepartmentName">Name</option>
          <option value="DepartmentCode">Code</option>
          <option value="DisplayOrder">Display Order</option>
          <option value="CreatedAt">Created Date</option>
          <option value="UpdatedAt">Updated Date</option>
        </select>
      </div>

      <div class="filter-item">
        <label>Direction</label>
        <select
          [(ngModel)]="sortDirection"
          (change)="onFilterChange()"
          class="filter-select"
        >
          <option value="asc">Ascending</option>
          <option value="desc">Descending</option>
        </select>
      </div>
    </div>

    <button class="btn btn-text" (click)="clearFilters()">
      Clear All Filters
    </button>
  </div>

  <!-- Loading State -->
  <div *ngIf="loading" class="loading-state">
    <div class="spinner"></div>
    <p>Loading departments...</p>
  </div>

  <!-- Error State -->
  <div *ngIf="error && !loading" class="error-state">
    <i class="bi bi-exclamation-circle"></i>
    <p>{{ error }}</p>
    <button class="btn btn-outline" (click)="loadDepartments()">
      Try Again
    </button>
  </div>

  <!-- AG Grid Table -->
  <div *ngIf="!loading && !error" class="grid-container">
    <!-- Empty State -->
    <div *ngIf="departments.length === 0" class="empty-state">
      <i class="bi bi-inbox"></i>
      <h3>No departments found</h3>
      <p>Try adjusting your filters or create a new department</p>
      <button class="btn btn-primary" (click)="createDepartment()">
        Create Department
      </button>
    </div>

    <!-- AG Grid -->
    <ag-grid-angular
      *ngIf="departments.length > 0"
      class="ag-theme-quartz"
      [rowData]="departments"
      [columnDefs]="columnDefs"
      [defaultColDef]="defaultColDef"
      [gridOptions]="gridOptions"
      (gridReady)="onGridReady($event)"
      [rowHeight]="60"
      [headerHeight]="50"
      [domLayout]="'autoHeight'"
    >
    </ag-grid-angular>
  </div>

  <!-- Pagination -->
  <div *ngIf="!loading && departments.length > 0" class="pagination-container">
    <div class="pagination-info">
      Showing {{ (currentPage - 1) * pageSize + 1 }} to
      {{ Math.min(currentPage * pageSize, totalCount) }} of
      {{ totalCount }} departments
    </div>

    <div class="pagination-controls">
      <select
        [(ngModel)]="pageSize"
        (change)="onPageSizeChange($event)"
        class="page-size-select"
      >
        <option [value]="10">10 per page</option>
        <option [value]="25">25 per page</option>
        <option [value]="50">50 per page</option>
        <option [value]="100">100 per page</option>
      </select>

      <div class="pagination-buttons">
        <button
          class="btn-page"
          [disabled]="currentPage === 1"
          (click)="onPageChange(1)"
        >
          <i class="bi bi-chevron-bar-left"></i>
        </button>
        <button
          class="btn-page"
          [disabled]="currentPage === 1"
          (click)="onPageChange(currentPage - 1)"
        >
          <i class="bi bi-chevron-left"></i>
        </button>

        <button
          *ngFor="let page of pages"
          class="btn-page"
          [class.active]="page === currentPage"
          (click)="onPageChange(page)"
        >
          {{ page }}
        </button>

        <button
          class="btn-page"
          [disabled]="currentPage === totalPages"
          (click)="onPageChange(currentPage + 1)"
        >
          <i class="bi bi-chevron-right"></i>
        </button>
        <button
          class="btn-page"
          [disabled]="currentPage === totalPages"
          (click)="onPageChange(totalPages)"
        >
          <i class="bi bi-chevron-bar-right"></i>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Modal for Department Form -->
<div class="modal-overlay" *ngIf="showFormModal" (click)="closeFormModal()">
  <div class="modal-container" (click)="$event.stopPropagation()">
    <button class="modal-close" (click)="closeFormModal()">
      <i class="bi bi-x-lg"></i>
    </button>
    <app-department-form
      [isModal]="true"
      [departmentId]="selectedDepartmentId"
      [isEditMode]="formMode === 'edit'"
      (formCancelled)="closeFormModal()"
      (formSubmitted)="onFormSuccess()"
    ></app-department-form>
  </div>
</div>
