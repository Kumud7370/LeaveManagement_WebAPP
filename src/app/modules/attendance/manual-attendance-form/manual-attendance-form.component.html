<div class="manual-form-container">
  <form (ngSubmit)="onSubmit()">
    <!-- Employee ID -->
    <div class="form-group">
      <label>Employee ID <span class="required">*</span></label>
      <input
        type="text"
        [(ngModel)]="formData.employeeId"
        name="employeeId"
        placeholder="Enter employee ID..."
        [class.is-error]="errors['employeeId']"
        [readonly]="isEditMode"
        [class.readonly-input]="isEditMode"
        (input)="errors['employeeId'] = ''"
      />
      <span class="error-msg" *ngIf="errors['employeeId']">{{
        errors["employeeId"]
      }}</span>
    </div>

    <!-- Date & Status Row -->
    <div class="form-row two-col">
      <div class="form-group">
        <label>Attendance Date <span class="required">*</span></label>
        <input
          type="date"
          [(ngModel)]="formData.attendanceDate"
          name="attendanceDate"
          [class.is-error]="errors['attendanceDate']"
          [max]="todayStr"
          (change)="errors['attendanceDate'] = ''"
        />
        <span class="error-msg" *ngIf="errors['attendanceDate']">{{
          errors["attendanceDate"]
        }}</span>
      </div>

      <div class="form-group">
        <label>Status <span class="required">*</span></label>
        <select [(ngModel)]="formData.status" name="status">
          <option [value]="AttendanceStatus.Present">Present</option>
          <option [value]="AttendanceStatus.Absent">Absent</option>
          <option [value]="AttendanceStatus.HalfDay">Half Day</option>
          <option [value]="AttendanceStatus.Leave">Leave</option>
          <option [value]="AttendanceStatus.Holiday">Holiday</option>
          <option [value]="AttendanceStatus.WeekOff">Week Off</option>
          <option [value]="AttendanceStatus.WorkFromHome">
            Work From Home
          </option>
          <option [value]="AttendanceStatus.OnDuty">On Duty</option>
        </select>
      </div>
    </div>

    <!-- Check In / Check Out Row -->
    <div class="form-row two-col">
      <div class="form-group">
        <label>Check-In Time</label>
        <input
          type="datetime-local"
          [(ngModel)]="formData.checkInTime"
          name="checkInTime"
          (change)="errors['checkInTime'] = ''"
        />
        <span class="hint-msg">Leave blank if not applicable</span>
      </div>

      <div class="form-group">
        <label>Check-Out Time</label>
        <input
          type="datetime-local"
          [(ngModel)]="formData.checkOutTime"
          name="checkOutTime"
          [class.is-error]="errors['checkOutTime']"
          (change)="errors['checkOutTime'] = ''"
        />
        <span class="error-msg" *ngIf="errors['checkOutTime']">{{
          errors["checkOutTime"]
        }}</span>
      </div>
    </div>

    <!-- Remarks -->
    <div class="form-group">
      <label>Remarks</label>
      <textarea
        [(ngModel)]="formData.remarks"
        name="remarks"
        rows="3"
        placeholder="Add notes or reason..."
        maxlength="500"
      ></textarea>
      <span class="hint-msg">{{ formData.remarks.length }}/500</span>
    </div>

    <!-- Actions -->
    <div class="form-actions">
      <button
        type="button"
        class="btn btn-cancel"
        (click)="onCancel()"
        [disabled]="submitting"
      >
        Cancel
      </button>
      <button type="submit" class="btn btn-submit" [disabled]="submitting">
        <span *ngIf="!submitting">
          <i
            class="bi"
            [ngClass]="isEditMode ? 'bi-pencil-fill' : 'bi-check-circle-fill'"
          ></i>
          {{ isEditMode ? "Update" : "Save Attendance" }}
        </span>
        <span *ngIf="submitting" class="loading-state">
          <div class="btn-spinner"></div>
          {{ isEditMode ? "Updating..." : "Saving..." }}
        </span>
      </button>
    </div>
  </form>
</div>
