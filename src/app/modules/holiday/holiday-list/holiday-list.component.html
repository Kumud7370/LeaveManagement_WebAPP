<div class="holiday-management">
  <!-- Header -->
  <div class="page-header">
    <div>
      <h1 class="page-title">Holiday Management</h1>
      <p class="page-subtitle">Manage your organization's holidays</p>
    </div>
  </div>

  <!-- Search and Actions Bar (ONE LINE) -->
  <div class="search-actions-bar">
    <div class="search-box">
      <i class="bi bi-search"></i>
      <input
        type="text"
        placeholder="Search holidays..."
        [(ngModel)]="searchTerm"
        (keyup.enter)="onSearch()"
      />
    </div>

    <div class="action-buttons-group">
      <button class="btn-action btn-clear" (click)="clearFilters()" title="Clear filters">
        <i class="bi bi-x-circle"></i>
        Clear
      </button>
      <button class="btn-action btn-refresh" (click)="loadHolidays()" title="Refresh data">
        <i class="bi bi-arrow-clockwise"></i>
        Refresh
      </button>
      <button class="btn-action btn-export" (click)="exportData()" title="Export data">
        <i class="bi bi-download"></i>
        Export
      </button>
      <button class="btn-action btn-add" (click)="openCreateModal()">
        <i class="bi bi-plus-circle"></i>
        Add Holiday
      </button>
    </div>
  </div>

  <!-- AG Grid -->
  <div class="grid-container">
    <ag-grid-angular
      class="ag-theme-alpine"
      [rowData]="holidays"
      [columnDefs]="columnDefs"
      [defaultColDef]="defaultColDef"
      [gridOptions]="gridOptions"
      [pagination]="false"
      [suppressPaginationPanel]="true"
      [domLayout]="'autoHeight'"
      [context]="context"
      (gridReady)="onGridReady($event)"
      style="width: 100%"
    >
    </ag-grid-angular>
  </div>

  <!-- Custom Pagination -->
  <div class="pagination-container" *ngIf="totalRecords > 0">
    <div class="pagination-info">
      Showing {{ (currentPage - 1) * pageSize + 1 }} to {{ getMaxRecords() }} of
      {{ totalRecords }} holidays
    </div>

    <div class="pagination-controls">
      <select
        class="page-size-select"
        [(ngModel)]="pageSize"
        (change)="onPageSizeChange(pageSize)"
      >
        <option [value]="10">10 per page</option>
        <option [value]="20">20 per page</option>
        <option [value]="50">50 per page</option>
        <option [value]="100">100 per page</option>
      </select>

      <div class="page-buttons">
        <button class="page-btn" [disabled]="currentPage === 1" (click)="onPageChange(1)" title="First page">
          <i class="bi bi-chevron-double-left"></i>
        </button>
        <button class="page-btn" [disabled]="currentPage === 1" (click)="onPageChange(currentPage - 1)" title="Previous page">
          <i class="bi bi-chevron-left"></i>
        </button>
        <span class="page-number">{{ currentPage }} / {{ totalPages }}</span>
        <button class="page-btn" [disabled]="currentPage === totalPages" (click)="onPageChange(currentPage + 1)" title="Next page">
          <i class="bi bi-chevron-right"></i>
        </button>
        <button class="page-btn" [disabled]="currentPage === totalPages" (click)="onPageChange(totalPages)" title="Last page">
          <i class="bi bi-chevron-double-right"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- Loading Overlay -->
  <div class="loading-overlay" *ngIf="isLoading">
    <div class="spinner"></div>
  </div>
</div>

<!-- Modal -->
<app-holiday-form
  *ngIf="showModal"
  [mode]="modalMode"
  [holiday]="selectedHoliday"
  (close)="onModalClose()"
  (success)="onModalSuccess()"
></app-holiday-form>
