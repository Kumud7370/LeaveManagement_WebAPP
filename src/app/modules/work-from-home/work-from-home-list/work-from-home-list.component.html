<div class="wfh-list-container">

  <!-- Page Header -->
  <div class="page-header">
    <div class="header-left">
      <h1 class="page-title">
        <i class="bi bi-house-heart"></i>
        Work From Home Requests
      </h1>
      <p class="page-subtitle">Manage and track employee WFH requests</p>
    </div>
  </div>

  <!-- Main Content -->
  <div class="content-wrapper" [class.sidebar-open]="showDetails">

    <!-- Grid Panel -->
    <div class="grid-panel">

      <!-- Filters -->
      <div class="filter-bar">
        <div class="search-box">
          <i class="bi bi-search"></i>
          <input
            type="text"
            placeholder="Search by reason..."
            [(ngModel)]="searchTerm"
            (keyup.enter)="onSearch()"
          />
          <button *ngIf="searchTerm" class="clear-btn" (click)="searchTerm = ''; onSearch()">
            <i class="bi bi-x"></i>
          </button>
        </div>

        <select class="filter-select" [(ngModel)]="selectedStatus" (change)="onStatusFilterChange()">
          <option value="">All Statuses</option>
          <option [value]="ApprovalStatus.Pending">Pending</option>
          <option [value]="ApprovalStatus.Approved">Approved</option>
          <option [value]="ApprovalStatus.Rejected">Rejected</option>
          <option [value]="ApprovalStatus.Cancelled">Cancelled</option>
        </select>

        <button class="btn btn-clear" (click)="onClearFilters()">
          <i class="bi bi-funnel"></i> Clear
        </button>

        <button class="btn btn-refresh" (click)="loadRequests()">
          <i class="bi bi-arrow-clockwise"></i> Refresh
        </button>

        <button class="btn btn-export" (click)="exportData()">
          <i class="bi bi-download"></i> Export
        </button>

        <button class="btn btn-primary" (click)="openCreateForm()">
          <i class="bi bi-plus-lg"></i> New WFH Request
        </button>
      </div>

      <!-- AG Grid -->
      <div class="grid-wrapper ag-theme-quartz">
        <div *ngIf="loading" class="grid-loading">
          <div class="spinner"></div>
          <p>Loading WFH requests...</p>
        </div>
        <ag-grid-angular
          *ngIf="!loading"
          [rowData]="rowData"
          [columnDefs]="columnDefs"
          [gridOptions]="gridOptions"
          (gridReady)="onGridReady($event)"
          style="width: 100%; height: 100%;"
        ></ag-grid-angular>
      </div>
    </div>

    <!-- Sidebar (Details only) -->
    <div class="sidebar-panel" *ngIf="showDetails">
      <div class="sidebar-header">
        <h3>Request Details</h3>
        <button class="close-btn" (click)="onSidebarClose()">
          <i class="bi bi-x-lg"></i>
        </button>
      </div>

      <app-wfh-request-details
        *ngIf="showDetails && selectedRequestId"
        [requestId]="selectedRequestId"
        (requestUpdated)="onRequestUpdated()"
      ></app-wfh-request-details>
    </div>

  </div>
</div>

<!-- Form Modal Overlay -->
<div class="modal-overlay" *ngIf="showForm" (click)="onSidebarClose()">
  <div class="modal-container" (click)="$event.stopPropagation()">
    <button class="modal-close" (click)="onSidebarClose()">
      <i class="bi bi-x-lg"></i>
    </button>
    <div class="modal-header">
      <h2>{{ editingRequest ? 'Edit WFH Request' : 'New WFH Request' }}</h2>
      <p>{{ editingRequest ? 'Update your WFH request details below' : 'Fill in the details to submit a WFH request' }}</p>
    </div>
    <app-wfh-request-form
      [existingRequest]="editingRequest"
      (saved)="onRequestSaved()"
      (cancelled)="onSidebarClose()"
    ></app-wfh-request-form>
  </div>
</div>
