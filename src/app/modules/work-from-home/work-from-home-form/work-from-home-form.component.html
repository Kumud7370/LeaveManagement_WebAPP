<div class="wfh-form-container">

  <form (ngSubmit)="onSubmit()">

    <!-- Date Range Row -->
    <div class="form-row two-col">
      <div class="form-group">
        <label>Start Date <span class="required">*</span></label>
        <input
          type="date"
          [(ngModel)]="formData.startDate"
          name="startDate"
          [class.is-error]="errors['startDate']"
          [min]="minDate"
          (change)="errors['startDate'] = ''"
        />
        <span class="error-msg" *ngIf="errors['startDate']">{{ errors['startDate'] }}</span>
      </div>

      <div class="form-group">
        <label>End Date <span class="required">*</span></label>
        <input
          type="date"
          [(ngModel)]="formData.endDate"
          name="endDate"
          [class.is-error]="errors['endDate']"
          [min]="formData.startDate || minDate"
          (change)="errors['endDate'] = ''"
        />
        <span class="error-msg" *ngIf="errors['endDate']">{{ errors['endDate'] }}</span>
      </div>
    </div>

    <!-- Total Days -->
    <div class="form-row two-col" *ngIf="totalDays > 0">
      <div class="form-group">
        <label>Total Days</label>
        <div class="days-input-wrapper">
          <input
            type="number"
            [value]="totalDays"
            readonly
            class="readonly-input"
          />
          <span class="days-unit">days</span>
        </div>
        <span class="hint-msg">Auto-computed: {{ totalDays }} calendar day(s)</span>
        <span class="error-msg" *ngIf="errors['duration']">{{ errors['duration'] }}</span>
      </div>
    </div>

    <!-- Reason -->
    <div class="form-group">
      <label>Reason <span class="required">*</span></label>
      <textarea
        [(ngModel)]="formData.reason"
        name="reason"
        rows="4"
        placeholder="Describe the reason for working from home (min 10 characters)..."
        [class.is-error]="errors['reason']"
        maxlength="500"
      ></textarea>
      <div class="textarea-footer">
        <span class="error-msg" *ngIf="errors['reason']">{{ errors['reason'] }}</span>
        <span class="char-count" [class.over]="formData.reason.length > 450">
          {{ formData.reason.length }}/500
        </span>
      </div>
    </div>

    <!-- Actions -->
    <div class="form-actions">
      <button type="button" class="btn btn-cancel" (click)="onCancel()" [disabled]="submitting">
        Cancel
      </button>
      <button type="submit" class="btn btn-submit" [disabled]="submitting">
        <span *ngIf="!submitting">
          <i class="bi" [ngClass]="isEditMode ? 'bi-pencil-square' : 'bi-check-circle'"></i>
          {{ isEditMode ? 'Update Request' : 'Submit Request' }}
        </span>
        <span *ngIf="submitting" class="submitting-state">
          <div class="btn-spinner"></div>
          {{ isEditMode ? 'Updating...' : 'Submitting...' }}
        </span>
      </button>
    </div>

  </form>
</div>
