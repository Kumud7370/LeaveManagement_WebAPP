<div class="login-container">
     <!-- Background Elements  -->
    <div class="background-overlay"></div>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

     <!-- Login Card  -->
    <div class="login-card">
         <!-- Header  -->
        <div class="login-header">
            <div class="logo-container">
                <img src="assets/images/mcgmlogo.png" alt="App Logo" style="height: 100px; width: 100px;"
                    class="logo-image" />
            </div>
            <h1 class="login-title">Welcome to</h1>
            <h1 class="login-title">AbelAttendanceWebAPP</h1>
            <p class="login-subtitle">Sign in to your account to continue</p>
        </div>

         <!-- Session info  -->
        <div *ngIf="loginInfo" class="login-info">
          <i class="fas fa-info-circle"></i>
          {{ loginInfo }}
        </div>

         <!-- Login Form  -->
        <form class="login-form" [formGroup]="loginForm" (ngSubmit)="onLogin()">
             <!-- Username Field  -->
            <div class="form-group">
                <label for="username" class="form-label">
                    <i class="fas fa-user"></i>
                    Username
                </label>
                <div class="input-wrapper">
                    <input type="text" id="username" formControlName="username" class="form-control"
                        placeholder="Enter your username" autocomplete="username" />
                    <div class="input-focus-border"></div>
                </div>
                <div *ngIf="f['username'].touched && f['username'].invalid" class="error-message">
                    <div *ngIf="f['username'].errors?.['required']">
                        <i class="fas fa-exclamation-circle"></i>
                        Username is required
                    </div>
                </div>
            </div>

             <!-- Password Field  -->
            <div class="form-group">
                <label for="password" class="form-label">
                    <i class="fas fa-lock"></i>
                    Password
                </label>
                <div class="input-wrapper">
                    <input [type]="showPassword ? 'text' : 'password'" id="password" formControlName="password"
                        class="form-control" placeholder="Enter your password" autocomplete="current-password" />
                    <button type="button" class="password-toggle" (click)="togglePasswordVisibility()"
                        aria-label="Toggle password visibility">
                        <i [class]="showPassword ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
                    </button>
                    <div class="input-focus-border"></div>
                </div>
                <div *ngIf="f['password'].touched && f['password'].invalid" class="error-message">
                    <div *ngIf="f['password'].errors?.['required']">
                        <i class="fas fa-exclamation-circle"></i>
                        Password is required
                    </div>
                </div>
            </div>

             <!-- Remember Me & Forgot Password  -->
            <!-- <div class="form-options">
                <div class="remember-me">
                    <input type="checkbox" id="rememberMe" formControlName="rememberMe" class="checkbox-input" />
                    <label for="rememberMe" class="checkbox-label">
                        <span class="checkbox-custom"></span>
                        Remember me
                    </label>
                </div>
            </div> -->

             <!-- Login Button  -->
            <button type="submit" class="login-button" [disabled]="loginForm.invalid || isLoading">
                <span *ngIf="!isLoading" class="button-content">
                    <i class="fas fa-sign-in-alt"></i>
                    Sign In
                </span>
                <span *ngIf="isLoading" class="button-loading">
                    <i class="fas fa-spinner fa-spin"></i>
                    Signing In...
                </span>
            </button>

             <!-- Error Message  -->
            <div *ngIf="loginError" class="login-error">
                <i class="fas fa-exclamation-triangle"></i>
                {{ loginError }}
            </div>
        </form>
    </div>
</div>
