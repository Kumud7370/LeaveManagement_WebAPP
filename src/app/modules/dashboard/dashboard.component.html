<div class="swm-dashboard-container">
  <!-- Header  -->
  <div class="dashboard-header">
    <div class="header-content">
      <div class="header-title">
        <i class="fas fa-chart-bar"></i>
        <h1>SWM Dashboard</h1>
      </div>
      <div class="header-date">
        <span class="date-label">Refuse Report:</span>
        <span class="date-value">31-07-2025</span>
      </div>
    </div>
  </div>

  <!-- Loading Indicator  -->
  <div class="loading-overlay" *ngIf="isLoadingWardData">
    <div class="spinner"></div>
    <div class="loading-text">Loading dashboard data...</div>
  </div>

  <!-- Dashboard Content  -->
  <div class="header-content dashboard-content" *ngIf="!isLoadingWardData">
    <div class="location-cards-section">
      <div class="location-card" *ngFor="let card of swmSites" [ngStyle]="{'--card-color': card.colorCode }">
        <div class="card-header">
          <h3>{{ card.siteName }}</h3>
          <i class="fas fa-truck"></i>
        </div>
        <div class="card-stats">
          <div class="stat-item">
            <div class="stat-value">{{ card.vehicleCount }}</div>
            <div class="stat-label">Vehicles</div>
          </div>
          <div class="stat-item">
            <div class="stat-value">{{ card.netWeight | number:'1.2-2' }}</div>
            <div class="stat-label">Net Weight (MT)</div>
          </div>
        </div>
      </div>
    </div>
    <div class="location-cards-section">
      <div class="location-card" *ngFor="let card of rtsSites" [ngStyle]="{'--card-color': card.colorCode }">

        </div>
        <div class="card-stats">
          <div class="stat-item">
            <div class="stat-value">{{ card.vehicleCount }}</div>
            <div class="stat-label">Vehicles</div>
          </div>
          <div class="stat-item">
            <div class="stat-value">{{ card.netWeight | number:'1.2-2' }}</div>
            <div class="stat-label">Net Weight (MT)</div>
          </div>
        </div>
      </div>
    </div>
