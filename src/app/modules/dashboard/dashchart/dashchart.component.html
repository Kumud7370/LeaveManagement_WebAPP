<div class="dashboard-container">
  <!-- Loading indicator -->
  <div *ngIf="isLoading" class="loading-container">
    <div class="spinner"></div>
    <p>Loading dashboard data...</p>
  </div>

  <!-- Error state -->
  <div *ngIf="hasError && !isLoading" class="error-container">
    <i class="fas fa-exclamation-triangle"></i>
    <p>Failed to load dashboard data</p>
    <button class="retry-btn" (click)="retryLoadData()">Retry</button>
  </div>

  <!-- Dashboard content -->
  <div *ngIf="!isLoading && !hasError">
    <div class="dashboard-card">
      <h4 class="dashboard-card-title">Graphical Representation - Ward Wise</h4>

      <nav class="dashboard-tabs">
        <a class="dashboard-tab active" [routerLink]="[]">Graph</a>
      </nav>
      
      <div class="dashboard-tab-content">
        <div class="dashboard-tab-pane active">
          <app-wardwisegraph></app-wardwisegraph>
        </div>
      </div>
    </div>

    <div class="dashboard-card">
      <h4 class="dashboard-card-title">Graphical Representation - Month Wise</h4>

      <nav class="dashboard-tabs">
        <a class="dashboard-tab" [class.active]="activeMonthTab === 'weight'" (click)="setActiveMonthTab('weight')">Net Weight Graph</a>
        <a class="dashboard-tab" [class.active]="activeMonthTab === 'vehicle'" (click)="setActiveMonthTab('vehicle')">Vehicle Count Graph</a>
      </nav>
      
      <div class="dashboard-tab-content">
        <div class="dashboard-tab-pane" [class.active]="activeMonthTab === 'weight'">
          <app-dashchart></app-dashchart>
        </div>
        <div class="dashboard-tab-pane" [class.active]="activeMonthTab === 'vehicle'">
          <div class="chart-container">
            <canvas baseChart 
              [datasets]="barChartDataMinor1.datasets" 
              [labels]="mbarChartLabelsMinor" 
              [options]="barChartOptions1" 
              [legend]="barChartLegend"
              [type]="'bar'">
            </canvas>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
