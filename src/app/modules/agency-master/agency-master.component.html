<div class="agency-list-container">
  <!-- Header -->
  <div class="report-header">
    <div class="header-content">
      <div class="header-title">
        <i class="fas fa-building"></i>
        <h1>Agency Master</h1>
      </div>
      <div class="header-actions">
        <button class="btn-add" (click)="openAddAgencyModal()" aria-label="Add Agency">
          <i class="fas fa-plus"></i>
          <span>Add Agency</span>
        </button>
        <button class="btn-back" (click)="Back()">
          <i class="fas fa-arrow-left"></i> Back to Dashboard
        </button>
      </div>
    </div>
  </div>
 <!-- Loading Indicator -->
  <div class="loading-overlay" *ngIf="loading">
    <div class="loading-spinner">
      <i class="fas fa-spinner fa-spin"></i>
      <span>Loading...</span>
    </div>
  </div>
  <!-- Add Agency Modal -->
  <div class="add-agency-modal-overlay" [class.show]="isAddModalOpen" (click)="closeAddModal()"></div>
  <div class="add-agency-modal" [class.show]="isAddModalOpen">
    <div class="modal-header">
      <h5 class="modal-title">{{modalTitle}}</h5>
      <button class="btn-close" (click)="closeAddModal()" aria-label="Close Modal">
        <i class="fas fa-times"></i>
      </button>
    </div>
    <div class="modal-body">
      <form [formGroup]="agencyForm" (ngSubmit)="onSubmit()">

        <div class="form-row">
          <div class="form-group">
            <label for="agencyName">Agency Name *</label>
            <div class="input-wrapper">
              <input type="text" id="agencyName" formControlName="agencyName" class="form-control"
                placeholder="Enter Agency Name" maxlength="100">
              <i class="fas fa-building"></i>
            </div>
            <div *ngIf="agencyForm.get('agencyName')?.touched && agencyForm.get('agencyName')?.invalid"
              class="error-message">
              <div *ngIf="agencyForm.get('agencyName')?.errors?.['required']">Firm Name is required</div>
            </div>
          </div>
          <div class="form-group">
            <label for="siteName">Location Name *</label>
            <div class="input-wrapper">
              <select formControlName="siteName" id="siteName" class="form-control">
                <option value="">Select Location</option>
                <option *ngFor="let l of siteLocations" [value]="l.siteName">
                  {{ l.siteDescription }}
                </option>
              </select>
            </div>
            <div *ngIf="agencyForm.get('siteName')?.touched && agencyForm.get('siteName')?.invalid"
              class="error-message">
              <div *ngIf="agencyForm.get('siteName')?.errors?.['required']">Location is required</div>
            </div>
          </div>
          <!-- <div class="form-group">
              <label for="vehicleType">Vehicle Type *</label>
              <div class="select-wrapper">
                <select id="vehicleType" formControlName="vehicleType" class="form-control">
                  <option value="">Select Vehicle Type</option>
                  <option *ngFor="let type of vehicleTypesList" [value]="type.vehicleType">
                    {{type.vehicleType}}
                  </option>
                </select>
                <i class="fas fa-truck"></i>
              </div>
              <div *ngIf="agencyForm.get('vehicleType')?.touched && agencyForm.get('vehicleType')?.invalid" class="error-message">
                <div *ngIf="agencyForm.get('vehicleType')?.errors?.['required']">Vehicle Type is required</div>
              </div>
            </div> -->
        </div>

        <div class="form-row">


          <div class="form-group">
            <label for="isPaid">Is Paid *</label>
            <div class="select-wrapper">
              <select id="isPaid" formControlName="isPaid" class="form-control">
                <option [value]="true">Yes</option>
                <option [value]="false">No</option>
              </select>
              <i class="fas fa-money-bill"></i>
            </div>
          </div>

          <div class="form-group">
            <label for="isActive">Status *</label>
            <div class="select-wrapper">
              <select id="isActive" formControlName="isActive" class="form-control">
                <option value="1">Active</option>
                <option value="0">Inactive</option>
              </select>
              <i class="fas fa-toggle-on"></i>
            </div>
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-primary" [disabled]="agencyForm.invalid || isSubmitting">
            <i class="fas fa-save"></i>
            <span>{{isSubmitting ? 'Saving...' : 'Save Agency'}}</span>
          </button>
          <button type="button" class="btn-secondary" (click)="resetForm()">
            <i class="fas fa-undo"></i> Reset
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Table View -->
  <div class="table-view">
    <div class="results-container">
      <div class="results-header">
        <h2>Agency Data</h2>
        <div class="results-actions">
          <button class="btn-export" (click)="download()">
            <i class="fas fa-file-excel"></i> Export to Excel
          </button>
        </div>
      </div>

      <!-- Quick Filter and Status Filters -->
      <div class="filter-controls">
        <div class="quick-filter">
          <label for="filter-text-box" class="visually-hidden">Quick Filter</label>
          <div class="input-group">
            <span class="input-group-text">
              <i class="fas fa-search"></i>
            </span>
            <input id="filter-text-box" class="form-control" placeholder="Search agencies..."
              (input)="onFilterTextBoxChanged()" [(ngModel)]="filterText" />
          </div>
        </div>

        <div class="status-filters">
          <button class="status-btn" [class.active]="activeFilter === 9" (click)="FilterData(9)">
            <i class="fas fa-list"></i> All
          </button>
          <button class="status-btn open" [class.active]="activeFilter === 0" (click)="FilterData(0)">
            <i class="fas fa-times-circle"></i> Inactive
          </button>
          <button class="status-btn closed" [class.active]="activeFilter === 1" (click)="FilterData(1)">
            <i class="fas fa-check-circle"></i> Active
          </button>
        </div>
      </div>

      <!-- AG Grid -->
      <div class="grid-container">
        <ag-grid-angular #agGrid style="width: 100%; height: 500px;" class="ag-theme-alpine"
          [rowData]="lstAgencyDataFiltered" [columnDefs]="columnDefs" [defaultColDef]="defaultColDef"
          [rowSelection]="rowSelection" (gridReady)="OnGridReady($event)">
        </ag-grid-angular>
      </div>
    </div>
  </div>

  <!-- No Data Message -->
  <div class="no-data-message" *ngIf="lstAgencyData.length === 0">
    <i class="fas fa-exclamation-circle"></i>
    <p>No agency data available.</p>
    <button class="btn-primary" (click)="openAddAgencyModal()">Add New Agency</button>
  </div>
</div>

<!-- Report Content -->
<div class="report-content report-spacing">
  <!-- Summary Cards -->
  <div class="summary-cards">
    <div class="summary-card">
      <div class="card-icon">
        <i class="fas fa-building"></i>
      </div>
      <div class="card-content">
        <div class="card-value">{{ lstAgencyData?.length || 0 }}</div>
        <div class="card-label">Total Agencies</div>
      </div>
    </div>

    <div class="summary-card">
      <div class="card-icon">
        <i class="fas fa-check-circle"></i>
      </div>
      <div class="card-content">
        <div class="card-value">{{ getStatusCount(1) }}</div>
        <div class="card-label">Active Agencies</div>
      </div>
    </div>

    <div class="summary-card">
      <div class="card-icon">
        <i class="fas fa-times-circle"></i>
      </div>
      <div class="card-content">
        <div class="card-value">{{ getStatusCount(0) }}</div>
        <div class="card-label">Inactive Agencies</div>
      </div>
    </div>

    <!-- <div class="summary-card">
      <div class="card-icon">
        <i class="fas fa-truck"></i>
      </div>
      <div class="card-content">
        <div class="card-value">{{ vehicleTypesList?.length || 0 }}</div>
        <div class="card-label">Vehicle Types</div>
      </div>
    </div> -->
  </div>
</div>
