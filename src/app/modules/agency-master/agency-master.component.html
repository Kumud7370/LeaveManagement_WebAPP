<div class="agency-list-container">
  <!-- Header -->
  <div class="report-header">
    <div class="header-content">
      <div class="header-title">
        <i class="fas fa-building"></i>
        <h1>Agency Master</h1>
      </div>
      <div class="header-actions">
        <button class="btn-add" (click)="openAddAgencyModal()" aria-label="Add Agency">
          <i class="fas fa-plus"></i>
          <span>Add Agency</span>
        </button>
        <button class="btn-back" (click)="Back()">
          <i class="fas fa-arrow-left"></i>
          <span class="back-text">Back to Dashboard</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Loading Indicator -->
  <div class="loading-overlay" *ngIf="loading">
    <div class="loading-spinner">
      <i class="fas fa-spinner fa-spin"></i>
      <span>Loading...</span>
    </div>
  </div>

  <!-- Add Agency Modal -->
  <div class="add-agency-modal-overlay" [class.show]="isAddModalOpen" (click)="closeAddModal()"></div>
  <div class="add-agency-modal" [class.show]="isAddModalOpen">
    <div class="modal-header">
      <h5 class="modal-title">{{modalTitle}}</h5>
      <button class="btn-close" (click)="closeAddModal()" aria-label="Close Modal">
        <i class="fas fa-times"></i>
      </button>
    </div>
    <div class="modal-body">
      <!-- 🔍 FIELD MAPPING GUIDE (shown only in edit mode) -->
      <div class="field-mapping-info" *ngIf="isEditMode">
        <div class="info-badge">
          <i class="fas fa-info-circle"></i>
          <span>Editing record from table row</span>
        </div>
      </div>

      <form [formGroup]="agencyForm" (ngSubmit)="onSubmit()">
        <!-- Row 1: Agency Name & Location -->
        <div class="form-row">
          <div class="form-group">
            <label for="agencyName">
              Agency Name <span class="required">*</span>
            </label>
            <div class="input-wrapper" [class.highlight-field]="isEditMode">
              <input type="text" id="agencyName" formControlName="agencyName" class="form-control"
                placeholder="Enter Agency Name" maxlength="100">
              <i class="fas fa-building"></i>
            </div>
            <div *ngIf="agencyForm.get('agencyName')?.touched && agencyForm.get('agencyName')?.invalid"
              class="error-message">
              <div *ngIf="agencyForm.get('agencyName')?.errors?.['required']">Agency Name is required</div>
            </div>
          </div>

          <div class="form-group">
            <label for="siteName">
              Location Name <span class="required">*</span>
            </label>
            <div class="select-wrapper" [class.highlight-field]="isEditMode">
              <select formControlName="siteName" id="siteName" class="form-control">
                <option value="">Select Location</option>
                <option *ngFor="let l of siteLocations" [value]="l.siteName">
                  {{ l.siteDescription }}
                </option>
              </select>
              <i class="fas fa-chevron-down"></i>
            </div>
            <div *ngIf="agencyForm.get('siteName')?.touched && agencyForm.get('siteName')?.invalid"
              class="error-message">
              <div *ngIf="agencyForm.get('siteName')?.errors?.['required']">Location is required</div>
            </div>
          </div>
        </div>

        <!-- Row 2: Is Paid & Status -->
        <div class="form-row">
          <div class="form-group">
            <label for="isPaid">
              Is Paid <span class="required">*</span>
            </label>
            <div class="select-wrapper" [class.highlight-field]="isEditMode">
              <select id="isPaid" formControlName="isPaid" class="form-control">
                <option [value]="true">Yes</option>
                <option [value]="false">No</option>
              </select>
              <i class="fas fa-money-bill"></i>
            </div>
          </div>

          <div class="form-group">
            <label for="isActive">
              Status <span class="required">*</span>
            </label>
            <div class="select-wrapper" [class.highlight-field]="isEditMode">
              <select id="isActive" formControlName="isActive" class="form-control">
                <option value="1">Active</option>
                <option value="0">Inactive</option>
              </select>
              <i class="fas fa-toggle-on"></i>
            </div>
          </div>
        </div>

        <!-- Form Actions -->
        <div class="form-actions">
          <button type="submit" class="btn-primary" [disabled]="agencyForm.invalid || isSubmitting">
            <i class="fas fa-save"></i>
            <span>{{isSubmitting ? 'Saving...' : 'Save Agency'}}</span>
          </button>
          <button type="button" class="btn-secondary" (click)="resetForm()">
            <i class="fas fa-undo"></i> <span>Reset</span>
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Report Content -->
  <div class="report-content report-spacing">
    <!-- Table View -->
    <div class="table-view">
      <div class="results-container">
        <div class="results-header">
          <h2>Agency Data</h2>
          <div class="results-actions">
            <button class="btn-export" (click)="download()">
              <i class="fas fa-file-excel"></i>
              <span class="export-text">Export to Excel</span>
            </button>
          </div>
        </div>

        <!-- Quick Filter and Status Filters -->
        <div class="filter-controls">
          <div class="quick-filter">
            <label for="filter-text-box" class="visually-hidden">Quick Filter</label>
            <div class="input-group">
              <span class="input-group-text">
                <i class="fas fa-search"></i>
              </span>
              <input id="filter-text-box" class="form-control" placeholder="Search agencies..."
                (input)="onFilterTextBoxChanged()" [(ngModel)]="filterText" />
            </div>
          </div>

          <div class="status-filters">
            <button class="status-btn" [class.active]="activeFilter === 9" (click)="FilterData(9)">
              <i class="fas fa-list"></i> <span>All</span>
            </button>
            <button class="status-btn open" [class.active]="activeFilter === 0" (click)="FilterData(0)">
              <i class="fas fa-times-circle"></i> <span>Inactive</span>
            </button>
            <button class="status-btn closed" [class.active]="activeFilter === 1" (click)="FilterData(1)">
              <i class="fas fa-check-circle"></i> <span>Active</span>
            </button>
          </div>
        </div>

        <!-- AG Grid -->
        <div class="grid-container">
          <ag-grid-angular #agGrid style="width: 100%; height: 500px;" id="myGrid" class="ag-theme-alpine"
            [columnDefs]="columnDefs" [rowData]="lstAgencyDataFiltered" [animateRows]="true" [pagination]="true"
            [paginationPageSize]="10" [paginationPageSizeSelector]="[10, 20, 50, 100]" [context]="context"
            [enableCellTextSelection]="true" [suppressRowClickSelection]="true" [rowSelection]="rowSelection"
            [defaultColDef]="defaultColDef" [components]="components" (gridReady)="OnGridReady($event)"
            (firstDataRendered)="headerHeightSetter($event)" (columnResized)="headerHeightSetter($event)">
          </ag-grid-angular>
        </div>
      </div>

      <!-- No Data Message -->
      <div class="no-data-message" *ngIf="lstAgencyData.length === 0">
        <i class="fas fa-exclamation-circle"></i>
        <p>No agency data available.</p>
        <button class="btn-primary" (click)="openAddAgencyModal()">Add New Agency</button>
      </div>
    </div>

    <!-- Summary Cards -->
    <div class="summary-container">
      <h3>Summary</h3>
      <div class="summary-cards">
        <div class="summary-card">
          <div class="card-icon">
            <i class="fas fa-building"></i>
          </div>
          <div class="card-content">
            <div class="card-value">{{ lstAgencyData?.length || 0 }}</div>
            <div class="card-label">Total Agencies</div>
          </div>
        </div>

        <div class="summary-card">
          <div class="card-icon">
            <i class="fas fa-check-circle"></i>
          </div>
          <div class="card-content">
            <div class="card-value">{{ getStatusCount(1) }}</div>
            <div class="card-label">Active Agencies</div>
          </div>
        </div>

        <div class="summary-card">
          <div class="card-icon">
            <i class="fas fa-times-circle"></i>
          </div>
          <div class="card-content">
            <div class="card-value">{{ getStatusCount(0) }}</div>
            <div class="card-label">Inactive Agencies</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
